<!DOCTYPE html>
{% load static %}
<html>
    <head>
        <title>{% block title %} Magical Survival Game {% endblock %}</title>
    </head>

    <body>
        <header>
            <nav class="nav">
            <a href="/Home">Home</a>
            <a href="/AboutUs">About</a>

            {% if user.is_authenticated %}
                <a href="/Main">Main</a>
                <a href="/MyAccount">MyAccount</a>
                <a href="/Logout">Logout</a>
            {% else %}
                <a href="/Login">Login</a>
                <a href="/Register">Register</a>
            {% endif %}
            </nav>
        </header>
    </body>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <small>WAD2 | 6B · Magical Survival Game</small>
    </footer>
</html>
