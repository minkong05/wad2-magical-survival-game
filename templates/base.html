<!DOCTYPE html>
{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Magical Survival Game{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    {% block extra_css %}{% endblock %}
</head>

<body>

    <header>
        <nav class="nav p-3 bg-light">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'about' %}">About</a>

            {% if user.is_authenticated %}
                <a href="{% url 'main' %}">Main</a>
                <a href="{% url 'myaccount' %}">MyAccount</a>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>
    </header>

    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer text-center mt-5 mb-3">
        <small>Magical Survival Game</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}

</body>
</html>
